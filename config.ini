[network]
multicast_port = 22600

[database]
filename = pumphouse.db

[email]
sender = stephenson.martin@gmail.com
receiver = stephenson.martin@gmail.com

[monitor]
pump_threshold_watts = 1000
unexpected_alert_threshold_minutes = 7

[treatment]
# Each cycle: interval_days,utc_start_hour,utc_end_hour,min_duration_minutes,label
# Separate multiple cycles with |
#
# NOTE: treatment units run on local time. UTC windows must be adjusted at each clock change:
#   BST (summer, UTC+1, late Mar–late Oct): use the values on the 'cycles' line below
#   GMT (winter, UTC+0, late Oct–late Mar): add 1 to each start/end hour
#     GMT cycles = 14,1,2,15,14-night | 5,2,4,3,5-night | 3,4,5,8,3-night
#
# BST:  14-night ~00:xx UTC | 5-night ~01-02:xx UTC | 3-night ~03:xx UTC
cycles = 14,0,1,15,14-night | 5,1,3,3,5-night | 3,3,4,8,3-night
summary_day = Monday
summary_hour_utc = 7
